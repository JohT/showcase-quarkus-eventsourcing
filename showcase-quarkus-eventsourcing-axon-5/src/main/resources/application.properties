# Configuration file

# Note: The dependency injection implementation of quarkus (ArC) removes beans that seem to be unused.
# Since it is not possible to detect beans loaded using "beanManager.getBeans",
# these would be removed. Telling quarkus to only remove "framework" beans that are not used
# is a good compromise.
quarkus.arc.remove-unused-beans=framework

# Exclude the production Axon configuration from CDI during tests so it doesn't interfere
# with the isolated test fixtures used by plain JUnit tests in dev mode continuous testing.
%test.quarkus.arc.exclude-types=io.github.joht.showcase.quarkuseventsourcing.messaging.infrastructure.axon.AxonConfigurationSetup

# Logging
quarkus.log.level=INFO

# Graceful shutdown
quarkus.shutdown.timeout=3

# H2 in-memory datasource for query model
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:axon5querymodel;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=false
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.datasource.jdbc.initial-size=2
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=8

# Query model persistence unit
quarkus.hibernate-orm."query.model".datasource=<default>
quarkus.hibernate-orm."query.model".packages=io.github.joht.showcase.quarkuseventsourcing.query.model
quarkus.hibernate-orm."query.model".database.generation=none
quarkus.hibernate-orm."query.model".validate-in-dev-mode=false

# Flyway for query schema only (command side uses InMemoryEventStorageEngine)
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=axon_on_microprofile_query_tryout
quarkus.flyway.locations=db/query/h2
quarkus.flyway.table=flyway_history
quarkus.flyway.connect-retries=3

# ---- PostgreSQL profile (activate with: mvn quarkus:dev -Dquarkus.profile=postgres) ----
#   PostgreSQL as database for the query-side (command side always uses InMemoryEventStorageEngine):
%postgres.quarkus.flyway.locations=db/query/postgresql
%postgres.quarkus.datasource.db-kind=postgresql
%postgres.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/postgres?stringtype=unspecified
%postgres.quarkus.datasource.username=${POSTGRES_USER:postgres}
%postgres.quarkus.datasource.password=${POSTGRES_PASSWORD:postgres}
%postgres.quarkus.hibernate-orm."query.model".dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS filter settings
rest.cors=true
rest.cors.allow.credentials=true
rest.cors.allow.origin=http://127.0.0.1:5500
rest.cors.allow.methods=GET,PUT,POST,DELETE,OPTIONS,HEAD
rest.cors.allow.headers=Origin,Authorization,Location,Content-Type
rest.cors.expose.headers=Origin,Authorization,Location,Content-Type
